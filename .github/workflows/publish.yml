name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: yarn build

      - name: Publish changed packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            pkg_name=$(node -p "require('./${dir}package.json').name")
            pkg_version=$(node -p "require('./${dir}package.json').version")
            pkg_private=$(node -p "require('./${dir}package.json').private || false")

            if [ "$pkg_private" = "true" ]; then
              echo "Skipping $pkg_name (private)"
              continue
            fi

            # Check if this version is already published
            if npm view "$pkg_name@$pkg_version" version 2>/dev/null; then
              echo "Skipping $pkg_name@$pkg_version (already published)"
            else
              echo "Publishing $pkg_name@$pkg_version"
              cd "$dir"
              npm publish
              cd -
            fi
          done
